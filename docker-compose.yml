version: "3.8"

services:
  backend:
    image: crisislens-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crisislens-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    volumes:
      # Optional: Mount data or models if needed
      - ./data:/app/data
      - ./models:/app/models

  frontend:
    image: crisislens-frontend:latest
    build:
      context: ./frontend
      # Inline dockerfile for local testing of the Vite app
      dockerfile_inline: |
        FROM node:20-slim
        WORKDIR /app
        COPY package*.json ./
        RUN npm install
        COPY . .
        EXPOSE 5173
        CMD ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    container_name: crisislens-frontend
    ports:
      - "5173:5173"
    environment:
      # Proxy backend requests to the backend container
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
